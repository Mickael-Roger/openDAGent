runtime:
  workdir: .
  db_path: runtime/runtime.db
  logs_dir: runtime/logs
  poll_interval_seconds: 5
  lease_duration_seconds: 120
  heartbeat_interval_seconds: 30
  cleanup_worktrees_on_exit: false

server:
  enabled: true
  host: 127.0.0.1
  port: 8080

inputs:
  discord:
    enabled: false
    bot_token_env: OPENDAGENT_DISCORD_TOKEN
    allowed_guild_ids: []
  email:
    enabled: false
    imap_host: imap.example.com
    smtp_host: smtp.example.com
    username: agent@example.com
    password_env: OPENDAGENT_EMAIL_PASSWORD
  api:
    enabled: true
    bind_host: 127.0.0.1
    bind_port: 8090

llm:
  default_provider: openai
  default_model: gpt-4.1
  providers:
    - id: openai
      type: openai
      endpoint: https://api.openai.com/v1
      auth:
        type: api_key
        env_var: OPENAI_API_KEY
      models:
        - id: gpt-4.1
          role: strong_reasoning
          features: [vision, json_mode, long_context, code]
          scores:
            reasoning: 8
            coding: 8
            writing: 7
        - id: gpt-4.1-mini
          role: balanced
          features: [vision, json_mode, code]
          scores:
            reasoning: 5
            coding: 5
            writing: 5
        # Uncomment to enable image generation (any OpenAI-compatible diffusion model):
        # - id: dall-e-3
        #   role: image_generation
        #   features: [image_generation]
        # Uncomment to enable native web search via GPT-4o with browsing:
        # - id: gpt-4o-search-preview
        #   role: balanced
        #   features: [native_web_search]
    - id: anthropic
      type: anthropic
      endpoint: https://api.anthropic.com
      auth:
        type: api_key
        env_var: ANTHROPIC_API_KEY
      models:
        - id: claude-opus-4-5
          role: strong_reasoning
          features: [vision, reasoning, long_context, code, json_mode]
          scores:
            reasoning: 10
            coding: 9
            writing: 9
        - id: claude-sonnet-4-5
          role: balanced
          features: [vision, long_context, code, json_mode]
          scores:
            reasoning: 7
            coding: 8
            writing: 8
        # Uncomment to enable native web search via Claude (when available):
        # - id: claude-sonnet-4-5
        #   role: balanced
        #   features: [vision, long_context, code, json_mode, native_web_search]
    - id: local
      type: openai
      endpoint: http://localhost:8000/v1
      auth:
        type: none
      models:
        - id: qwen-fast
          role: cheap_fast
          features: []

git:
  default_branch: main
  auto_gc: false
  projects_dir: projects
  sandboxes_dir: sandboxes

planner:
  max_tasks_per_plan: 15

scheduler:
  max_running_tasks_per_goal: 3
  max_running_tasks_total: 8

approvals:
  default_required_for_high_risk: true

opencode:
  # Set enabled: false to prevent openDAGent from starting opencode serve even if the
  # opencode binary is present in PATH.
  enabled: true
  # Port for the opencode serve API (must not conflict with other services).
  port: 9180
  # Optional: force a specific model for coding tasks (e.g. "anthropic/claude-opus-4-5").
  # If omitted, the first code-capable model in the llm section is used automatically.
  # model_hint: anthropic/claude-opus-4-5

mcp:
  servers: []
