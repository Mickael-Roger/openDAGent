<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | openDAGent</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <a class="brand" href="{{ url_for('dashboard') }}">
                <span class="brand-mark">AW</span>
                <span>
                    <strong>openDAGent</strong>
                    <small>Execution Control Plane</small>
                </span>
            </a>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}">Projects</a>
            </nav>
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
