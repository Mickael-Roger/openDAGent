<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} | openDAGent</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="shell">
        <aside class="sidebar">
            <a class="brand" href="{{ url_for('dashboard') }}">
                <img src="{{ url_for('static', path='/logo.png') }}" alt="openDAGent" class="brand-logo">
            </a>
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}">Projects</a>
                <a href="{{ url_for('capabilities_list') }}">Capabilities</a>
                <a href="{{ url_for('models_page') }}">Models</a>
            </nav>
        </aside>
        <main class="content">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Shared artifact viewer modal (used by project_detail and task_detail) -->
    <div id="artifact-modal" class="artifact-modal" hidden>
        <div class="artifact-modal-backdrop"></div>
        <div class="artifact-modal-box">
            <div class="artifact-modal-header">
                <div>
                    <strong id="artifact-modal-key"></strong>
                    <span id="artifact-modal-meta" style="color:var(--muted);font-size:0.82rem;margin-left:10px"></span>
                </div>
                <div style="display:flex;gap:8px">
                    <a id="artifact-modal-download" class="btn-ghost" style="padding:6px 14px;font-size:0.82rem" download>Download</a>
                    <button class="btn-ghost" id="artifact-modal-close" style="padding:6px 14px;font-size:0.82rem">Close</button>
                </div>
            </div>
            <div id="artifact-modal-body" class="artifact-modal-body"></div>
        </div>
    </div>
    <script src="{{ url_for('static', path='/artifact-viewer.js') }}"></script>
</body>
</html>
